<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aanya — as a student</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{--cream:#f7f3eb;--ink:#0d0d0d;--ink-soft:#2a2a2a;--gold:#8a7355;--muted:rgba(13,13,13,.4);--border:rgba(13,13,13,.1)}
body{font-family:'EB Garamond',serif;text-transform:lowercase;background:var(--cream);color:var(--ink);min-height:100vh;cursor:default;overflow-x:hidden}

.scrapbook{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.scrapbook img{position:absolute;display:block;object-fit:contain;filter:saturate(1.4) drop-shadow(0 6px 14px rgba(0,0,0,.13));user-select:none}
nav,section,.map-section,.note-panel,.reflections{position:relative;z-index:1}

/* ── NAV ── */
nav{padding:20px 48px;display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:.5px solid var(--border);position:sticky;top:0;
  background:rgba(247,243,235,.92);backdrop-filter:blur(8px);z-index:100}
.nav-back{font-size:15px;font-style:italic;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--ink)}
.nav-label{font-size:11px;font-style:italic;color:var(--muted);letter-spacing:3px}

/* ── HERO ── */
.hero{max-width:680px;margin:64px auto 48px;padding:0 24px}
.room-tag{font-size:11px;letter-spacing:4px;color:var(--gold);margin-bottom:16px;display:block}
.hero h1{font-size:clamp(36px,5vw,60px);font-style:italic;font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:12px}
.hero-sub{font-size:16px;font-style:italic;color:var(--muted);line-height:1.9;max-width:500px}

/* ── MAP AREA ── */
.map-section{max-width:900px;margin:0 auto;padding:48px 24px}
.map-label{font-size:11px;letter-spacing:4px;color:var(--muted);margin-bottom:36px}
.campus-map{position:relative;width:100%;max-width:840px;height:300px}
.map-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
.route-path{fill:none;stroke:rgba(138,115,85,.3);stroke-width:1.5;stroke-dasharray:6 6;
  animation:dashFlow 20s linear infinite}
@keyframes dashFlow{to{stroke-dashoffset:-100}}

.map-node{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  opacity:0;animation:nodeIn .5s ease forwards var(--nd,0s)}
@keyframes nodeIn{to{opacity:1}}
.node-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(138,115,85,.45);border:1.5px solid rgba(138,115,85,.7);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:2}
.node-dot::after{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(138,115,85,.2);
  animation:nodePulse 2.5s ease-in-out infinite var(--pd,0s)}
@keyframes nodePulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.5);opacity:0}}
.map-node:hover .node-dot{
  background:rgba(138,115,85,.9);
  box-shadow:0 0 0 4px rgba(138,115,85,.12),0 0 16px rgba(138,115,85,.2)}
.node-label{
  font-size:11px;font-style:italic;color:var(--muted);
  text-align:center;white-space:nowrap;transition:color .2s}
.map-node:hover .node-label{color:var(--ink)}

/* ── NOTE PANEL ── */
.note-panel{max-width:560px;margin:0 auto;padding:0 24px;min-height:180px;margin-bottom:60px}
.note-card{opacity:0;transform:translateY(8px);transition:opacity .45s ease,transform .45s ease;pointer-events:none}
.note-card.visible{opacity:1;transform:none;pointer-events:auto}

.note-place{font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;display:block}
.note-heading{font-size:24px;font-style:italic;color:var(--ink);margin-bottom:14px;line-height:1.25}
.note-body{font-size:16px;font-style:italic;color:var(--muted);line-height:2;margin-bottom:16px}
.note-detail-row{display:flex;gap:24px;flex-wrap:wrap;padding-top:14px;border-top:.5px solid var(--border)}
.note-detail{display:flex;flex-direction:column;gap:2px}
.detail-k{font-size:10px;letter-spacing:2.5px;color:var(--muted)}
.detail-v{font-size:13px;font-style:italic;color:rgba(13,13,13,.55)}
.note-prompt{font-size:16px;font-style:italic;color:var(--muted);padding-top:16px}

/* ── REFLECTIONS ── */
.reflections{max-width:640px;margin:0 auto;padding:40px 24px 100px;border-top:.5px solid var(--border)}
.ref-label{font-size:11px;letter-spacing:4px;color:var(--muted);margin-bottom:28px}
.ref-item{padding:16px 0;border-top:.5px solid var(--border);
  opacity:0;animation:nodeIn .5s ease forwards var(--rd,0s)}
.ref-text{font-size:17px;font-style:italic;color:var(--muted);line-height:1.95}
</style>
</head>
<body>
<div id="pg-veil" style="position:fixed;inset:0;background:#f7f3eb;z-index:99998;pointer-events:none;transition:opacity .55s ease"></div>
<script>requestAnimationFrame(()=>requestAnimationFrame(()=>{var v=document.getElementById('pg-veil');if(v){v.style.opacity='0';setTimeout(()=>v.remove(),620);}}));</script>

<div class="scrapbook">
  <img style="width:18%;opacity:0.26;transform:rotate(-5deg);top:5%;left:-1%;"   src="background scrapbook/Screenshot_2026-05-08_at_1.51.21_PM-removebg-preview.png">
  <img style="width:21%;opacity:0.20;transform:rotate(8deg);top:20%;left:1%;"    src="background scrapbook/ChatGPT_Image_May_8__2026__01_58_51_PM-removebg-preview.png">
  <img style="width:19%;opacity:0.22;transform:rotate(-3deg);top:42%;left:-2%;"  src="background scrapbook/Screenshot_2026-05-08_at_1.51.28_PM-removebg-preview.png">
  <img style="width:15%;opacity:0.24;transform:rotate(4deg);top:64%;left:3%;"    src="background scrapbook/31a1ae57-af37-4164-8146-ca160390fb23.png">
  <img style="width:16%;opacity:0.26;transform:rotate(6deg);top:7%;right:1%;"    src="background scrapbook/Screenshot_2026-05-08_at_1.56.28_PM-removebg-preview.png">
  <img style="width:19%;opacity:0.22;transform:rotate(-4deg);top:26%;right:-2%;" src="background scrapbook/Screenshot_2026-05-08_at_1.55.53_PM-removebg-preview.png">
  <img style="width:13%;opacity:0.24;transform:rotate(4deg);top:50%;right:1%;"   src="background scrapbook/74c6d361-28fc-48ee-be7d-ac880a32ec1b.png">
  <img style="width:17%;opacity:0.20;transform:rotate(-8deg);top:72%;right:-1%;" src="background scrapbook/7e2bd913-7927-41fe-8677-fa678ec2b04a.png">
</div>

<nav>
  <a href="aanya-portfolio-v14.html" class="nav-back">← back</a>
  <span class="nav-label">as a student</span>
</nav>

<section class="hero">
  <span class="room-tag">usc campus · los angeles</span>
  <h1>where i've been<br>and what stuck</h1>
  <p class="hero-sub">a map of the places — literal and otherwise — that shaped how i think. tap a node to read a note.</p>
</section>

<div class="map-section">
  <p class="map-label">the route</p>
  <div class="campus-map" id="campus-map">
    <svg class="map-svg" id="route-svg" viewBox="0 0 840 300" preserveAspectRatio="none"></svg>
  </div>
</div>

<div class="note-panel" id="note-panel">
  <p class="note-prompt">tap a location on the map above.</p>
</div>

<section class="reflections">
  <p class="ref-label">things i've learned so far</p>
  <div id="ref-list"></div>
</section>

<script>
const NODES = [
  {id:'n1',label:'bovard',x:8,y:50,place:'bovard auditorium',heading:'where big things happen',body:'the first time i stood on a stage here, the room was almost empty. it didn\'t feel empty. some places hold their history — you can feel the weight of everyone who stood there before.',details:{year:'2024',memory:'first performance',feeling:'terrifying, then right'},nd:'.1s',pd:'0s'},
  {id:'n2',label:'ground zero',x:22,y:30,place:'ground zero coffee house',heading:'where the good conversations happen',body:'ground zero at 11pm on a tuesday. bad coffee, good ideas. the place where half the things i care about were either started or talked out of existence.',details:{year:'ongoing',memory:'too many to count',feeling:'like a second home'},nd:'.2s',pd:'.2s'},
  {id:'n3',label:'sandbox',x:38,y:65,place:'usc sandbox',heading:'where things get built',body:'sandbox is where "what if" becomes "what next." the makeathon was the first time i organized something and watched strangers become a team in twelve hours.',details:{year:'2024',memory:'sandbox makeathon',feeling:'chaotic, productive'},nd:'.3s',pd:'.4s'},
  {id:'n4',label:'dfa studio',x:55,y:35,place:'dfa @ usc workspace',heading:'where i learned to lead',body:'running a chapter means you\'re always a few steps ahead of where you\'re comfortable. that distance is what makes you learn. the dfa space is where i figured out the difference between managing and actually leading.',details:{year:'2024–present',memory:'chapter launch',feeling:'uncertain, then proud'},nd:'.4s',pd:'.6s'},
  {id:'n5',label:'the village',x:70,y:55,place:'usc village',heading:'where you learn to just exist somewhere',body:'the village is the background of everything. the in-between place. i\'ve had conversations there that changed things, and walked through it a thousand times without thinking. it\'s where campus feels like a city.',details:{year:'ongoing',memory:'the walk home',feeling:'ordinary, then necessary'},nd:'.5s',pd:'.8s'},
  {id:'n6',label:'3am library',x:85,y:40,place:'doheny memorial library',heading:'where thinking happens late',body:'every student has a place where they do their actual thinking. mine is doheny at 3am when it\'s almost empty. the stacks have a particular quiet — not silence, but the sound of everyone trying.',details:{year:'ongoing',memory:'finals week, every time',feeling:'focused, occasionally desperate'},nd:'.6s',pd:'1s'},
];

const mapEl = document.getElementById('campus-map');
const svg = document.getElementById('route-svg');
const pts = NODES.map(n => ({x:n.x/100*840,y:n.y/100*300}));
let d = `M ${pts[0].x} ${pts[0].y}`;
for (let i=1;i<pts.length;i++){
  const prev=pts[i-1],curr=pts[i],mx=(prev.x+curr.x)/2;
  d+=` C ${mx} ${prev.y}, ${mx} ${curr.y}, ${curr.x} ${curr.y}`;
}
const path=document.createElementNS('http://www.w3.org/2000/svg','path');
path.setAttribute('class','route-path');path.setAttribute('d',d);svg.appendChild(path);

let activeNode=null;
const notePanel=document.getElementById('note-panel');
NODES.forEach(n=>{
  const node=document.createElement('div');
  node.className='map-node';
  node.style.cssText=`left:${n.x}%;top:${n.y}%;--nd:${n.nd};--pd:${n.pd}`;
  node.innerHTML=`<div class="node-dot"></div><span class="node-label">${n.label}</span>`;
  node.addEventListener('click',()=>{
    if(activeNode===n.id){activeNode=null;notePanel.innerHTML='<p class="note-prompt">tap a location on the map above.</p>';return;}
    activeNode=n.id;showNote(n);
  });
  mapEl.appendChild(node);
});

function showNote(n){
  const card=document.createElement('div');card.className='note-card';
  card.innerHTML=`
    <span class="note-place">${n.place}</span>
    <h3 class="note-heading">${n.heading}</h3>
    <p class="note-body">${n.body}</p>
    <div class="note-detail-row">
      ${Object.entries(n.details).map(([k,v])=>`<div class="note-detail"><span class="detail-k">${k}</span><span class="detail-v">${v}</span></div>`).join('')}
    </div>`;
  notePanel.innerHTML='';notePanel.appendChild(card);
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('visible')));
}

const REFS=[
  {text:'"student" is a cover story. everyone is here to figure out who they\'re going to be.',rd:'.1s'},
  {text:'the classes that changed me were the ones where the professor cared more than they had to.',rd:'.2s'},
  {text:'you learn more from the projects you run yourself than from any lecture. the responsibility is the teacher.',rd:'.3s'},
  {text:'usc is a city inside a city. the best parts of it are the parts you make yourself.',rd:'.4s'},
];
const refList=document.getElementById('ref-list');
REFS.forEach(r=>{
  const el=document.createElement('div');el.className='ref-item';el.style.setProperty('--rd',r.rd);
  el.innerHTML=`<p class="ref-text">${r.text}</p>`;refList.appendChild(el);
});
</script>
</body>
</html>
