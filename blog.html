<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aanya — blog</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f7f3eb;
  --ink: #0d0d0d;
  --ink-soft: #2a2a2a;
  --gold: #8a7355;
  --muted: rgba(13,13,13,0.4);
  --border: rgba(13,13,13,0.1);
  --mono: 'Space Mono', 'Courier New', monospace;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'EB Garamond', serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  text-transform: lowercase;
  cursor: default;
}

/* ── LAYOUT ── */
.page { display: none; }
.page.active { display: block; }

/* ── NAV ── */
nav {
  padding: 20px 48px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(247,243,235,0.92);
  backdrop-filter: blur(8px);
  z-index: 100;
}
.nav-back {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  font-style: italic;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--ink); }
.nav-name {
  font-size: 18px;
  font-style: italic;
  color: var(--gold);
  text-decoration: none;
  letter-spacing: 1px;
}
.nav-links { display: flex; gap: 28px; align-items: baseline; }
.nav-links a {
  font-size: 15px;
  font-style: italic;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); }

/* ── FEED PAGE ── */
.feed-header {
  max-width: 680px;
  margin: 64px auto 48px;
  padding: 0 24px;
}
.feed-title {
  font-size: clamp(36px, 5vw, 52px);
  font-weight: 400;
  line-height: 1.1;
  margin-bottom: 12px;
}
.feed-title em { color: var(--gold); font-style: italic; }
.feed-desc {
  font-size: 16px;
  font-style: italic;
  color: var(--muted);
  line-height: 1.7;
}

.feed {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 96px;
}

.post-card {
  padding: 32px 0;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
.post-card:hover { opacity: 0.7; }

.post-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.post-date {
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
}
.post-tag {
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--gold);
  border: 0.5px solid rgba(138,115,85,0.4);
  padding: 2px 8px;
  border-radius: 2px;
}
.post-title-feed {
  font-size: 24px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 8px;
}
.post-preview {
  font-size: 16px;
  font-style: italic;
  color: var(--muted);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.post-read-more {
  margin-top: 10px;
  font-size: 13px;
  font-style: italic;
  color: var(--gold);
}

.feed-empty {
  padding: 80px 0;
  text-align: center;
  color: var(--muted);
  font-style: italic;
  font-size: 18px;
  line-height: 1.8;
}

/* ── POST PAGE ── */
.post-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 56px 24px 120px;
}
.post-back {
  font-size: 14px;
  font-style: italic;
  color: var(--muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 40px;
  transition: color 0.2s;
}
.post-back:hover { color: var(--ink); }

.post-header-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
}
.post-title-full {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 500;
  line-height: 1.2;
  margin-bottom: 24px;
}
.post-divider {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 28px 0;
}
.post-body {
  font-size: 18px;
  line-height: 1.85;
  color: var(--ink-soft);
}
.post-body p { margin-bottom: 24px; }
.post-body p:last-child { margin-bottom: 0; }
.post-body em { font-style: italic; color: var(--ink); }
.post-body strong { font-weight: 600; }
.post-body img {
  display: block;
  max-width: 100%;
  max-height: 620px;
  object-fit: contain;
  margin: 34px auto;
  border-radius: 3px;
  filter: drop-shadow(0 8px 26px rgba(0,0,0,0.13));
}

/* ── WRITE PAGE ── */
.write-page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 24px 120px;
}
.write-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 0.5px solid var(--border);
}
.write-header h2 {
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  color: var(--gold);
}

/* password gate */
.auth-page {
  max-width: 420px;
  margin: 0 auto;
  padding: 88px 24px 120px;
}
.auth-box {
  border-top: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  padding: 32px 0;
}
.auth-title {
  font-size: 24px;
  font-weight: 400;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 18px;
}
.auth-form {
  display: flex;
  gap: 10px;
}
.auth-input {
  flex: 1;
  min-width: 0;
  font-family: 'EB Garamond', serif;
  font-size: 18px;
  color: var(--ink);
  background: transparent;
  border: none;
  border-bottom: 0.5px solid var(--border);
  padding: 9px 0;
  outline: none;
}
.auth-input::placeholder { color: rgba(0,0,0,0.22); font-style: italic; }
.auth-submit {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
  background: transparent;
  border: 0.5px solid rgba(138,115,85,0.35);
  border-radius: 999px;
  padding: 8px 18px;
  cursor: pointer;
  text-transform: lowercase;
}
.auth-submit:hover { color: var(--ink); border-color: rgba(0,0,0,0.3); }
.auth-error {
  min-height: 20px;
  margin-top: 12px;
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
}

/* post list in writer */
.draft-list { margin-bottom: 40px; }
.draft-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 0.5px solid var(--border);
  gap: 16px;
}
.draft-item-title { font-size: 16px; font-weight: 500; flex: 1; }
.draft-item-date { font-size: 12px; font-style: italic; color: var(--muted); white-space: nowrap; }
.draft-item-actions { display: flex; gap: 12px; }
.btn-ghost {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px 0;
  transition: color 0.2s;
  text-transform: lowercase;
}
.btn-ghost:hover { color: var(--ink); }
.btn-ghost.delete:hover { color: #c0392b; }

/* editor */
.editor-wrap {
  background: white;
  border: 0.5px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,0.05);
}
.editor-toolbar {
  padding: 10px 20px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar-btn {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  background: none;
  border: 0.5px solid var(--border);
  border-radius: 3px;
  padding: 3px 10px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
  text-transform: lowercase;
}
.toolbar-btn:hover { background: var(--cream); color: var(--ink); border-color: rgba(0,0,0,0.2); }
.editor-image-input { display: none; }

.editor-fields { padding: 28px 32px; }
.editor-field-title {
  font-family: 'EB Garamond', serif;
  font-size: 28px;
  font-weight: 500;
  border: none;
  outline: none;
  width: 100%;
  color: var(--ink);
  background: transparent;
  margin-bottom: 8px;
  text-transform: lowercase;
}
.editor-field-title::placeholder { color: rgba(0,0,0,0.2); }

.editor-field-tag {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  font-style: italic;
  border: none;
  outline: none;
  width: 100%;
  color: var(--gold);
  background: transparent;
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: lowercase;
}
.editor-field-tag::placeholder { color: rgba(138,115,85,0.3); }

.editor-divider { width: 32px; height: 1px; background: var(--border); margin-bottom: 20px; }

.editor-body {
  font-family: 'EB Garamond', serif;
  font-size: 18px;
  line-height: 1.85;
  border: none;
  outline: none;
  width: 100%;
  min-height: 320px;
  color: var(--ink-soft);
  background: transparent;
  resize: none;
  text-transform: none;
}
.editor-body::placeholder { color: rgba(0,0,0,0.18); font-style: italic; }
.editor-images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.editor-image-card {
  position: relative;
  min-height: 118px;
  border: 0.5px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: var(--cream);
}
.editor-image-card img {
  width: 100%;
  height: 100%;
  min-height: 118px;
  object-fit: cover;
  display: block;
}
.editor-image-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--ink);
  background: rgba(247,243,235,0.92);
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 999px;
  padding: 2px 8px;
  cursor: pointer;
  text-transform: lowercase;
}

.editor-actions {
  padding: 16px 32px;
  border-top: 0.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.editor-status { font-size: 13px; font-style: italic; color: var(--muted); }

.btn-publish {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  font-style: italic;
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 8px 24px;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity 0.2s;
  text-transform: lowercase;
}
.btn-publish:hover { opacity: 0.8; }
.btn-publish.draft {
  background: none;
  color: var(--muted);
  border: 0.5px solid var(--border);
  margin-right: 12px;
}
.btn-publish.draft:hover { color: var(--ink); border-color: rgba(0,0,0,0.3); opacity: 1; }

.new-post-btn {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  font-style: italic;
  background: none;
  border: 0.5px solid var(--border);
  padding: 7px 20px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  text-transform: lowercase;
}
.new-post-btn:hover { color: var(--ink); border-color: rgba(0,0,0,0.3); }

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--cream);
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  font-style: italic;
  padding: 10px 24px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── SCRAPBOOK MARGINS ── */
.blog-scrapbook {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.blog-scrapbook img {
  position: absolute;
  display: block;
  object-fit: contain;
  filter: saturate(1.4) drop-shadow(0 6px 14px rgba(0,0,0,0.13));
  user-select: none;
}
nav, .page { position: relative; z-index: 1; }

/* ── SCROLL PROGRESS ── */
.scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px; width: 0%;
  background: var(--gold); z-index: 200;
  transition: width 0.08s linear;
}

/* ── EDITORIAL META / SECTION LABELS ── */
.feed-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.feed-eyebrow::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

/* ── FEED FILTER ── */
.feed-filter {
  max-width: 680px;
  margin: 0 auto 8px;
  padding: 0 24px;
  display: flex;
  gap: 18px;
  align-items: baseline;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  background: none; border: none;
  cursor: pointer; padding: 4px 0;
  position: relative;
  transition: color 0.2s;
}
.filter-btn::after {
  content: ''; position: absolute; left: 0; bottom: -2px;
  width: 0; height: 1px; background: var(--gold);
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
}
.filter-btn:hover { color: var(--ink); }
.filter-btn.active { color: var(--ink); }
.filter-btn.active::after { width: 100%; }
.filter-count { font-size: 9px; opacity: 0.55; vertical-align: super; margin-left: 2px; }

/* ── STAGGER REVEAL ── */
.stagger-item { opacity: 0; transform: translateY(22px); }
.stagger-item.in { opacity: 1; transform: translateY(0);
  transition: opacity 0.55s cubic-bezier(0.16,1,0.3,1), transform 0.55s cubic-bezier(0.16,1,0.3,1); }

/* ── EVAL FEED CARD ── */
.eval-card {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  position: relative;
}
.eval-card::before {
  content: ''; position: absolute; left: -24px; top: 0; bottom: 0;
  width: 2px; background: var(--gold); opacity: 0; transform: scaleY(0.4);
  transform-origin: top; transition: opacity 0.3s, transform 0.3s;
}
.eval-card:hover::before { opacity: 1; transform: scaleY(1); }

.score-dial {
  flex-shrink: 0;
  width: 64px; height: 64px;
  border-radius: 50%;
  display: grid; place-items: center;
  background:
    radial-gradient(closest-side, var(--cream) 80%, transparent 81% 100%),
    conic-gradient(var(--gold) calc(var(--score,0) * 1%), rgba(138,115,85,0.16) 0);
  position: relative;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
.eval-card:hover .score-dial { transform: scale(1.08) rotate(-3deg); }
.score-dial .score-num {
  font-family: var(--mono);
  font-size: 18px; font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.score-dial .score-den {
  position: absolute; bottom: 9px;
  font-family: var(--mono); font-size: 8px; color: var(--muted);
}
.eval-card-body { flex: 1; min-width: 0; }
.eval-tag {
  color: #fff !important;
  background: var(--gold);
  border-color: var(--gold) !important;
}
.eval-platform { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
.eval-verdict {
  font-size: 17px; font-style: italic;
  color: var(--ink-soft); line-height: 1.55; margin-top: 4px;
}

/* ── EVAL VIEW PAGE ── */
.eval-hero {
  display: flex; gap: 26px; align-items: center;
  margin-bottom: 6px;
}
.eval-hero .score-dial { width: 92px; height: 92px; }
.eval-hero .score-dial .score-num { font-size: 28px; }
.eval-hero .score-dial .score-den { bottom: 14px; font-size: 10px; }
.eval-hero-meta { flex: 1; }
.eval-product-name { font-size: clamp(28px,4vw,44px); font-weight: 500; line-height: 1.1; }
.eval-product-sub { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; color: var(--muted); margin-top: 8px; text-transform: uppercase; }
.eval-verdict-big {
  font-size: clamp(20px,2.6vw,26px); font-style: italic;
  color: var(--ink); line-height: 1.5; margin: 28px 0 8px;
}
.eval-verdict-big::before { content: '\201C'; color: var(--gold); }
.eval-verdict-big::after { content: '\201D'; color: var(--gold); }

.eval-columns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 36px;
  margin: 40px 0 8px;
}
@media (max-width: 600px) { .eval-columns { grid-template-columns: 1fr; gap: 28px; } }
.eval-col-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 0.5px solid var(--border);
}
.eval-col.works .eval-col-label { color: #4a7c59; }
.eval-col.broken .eval-col-label { color: #b0573f; }
.eval-point {
  display: flex; gap: 10px; font-size: 16px; line-height: 1.55;
  color: var(--ink-soft); margin-bottom: 12px;
}
.eval-point .mark { font-family: var(--mono); font-weight: 700; flex-shrink: 0; }
.eval-col.works .mark { color: #4a7c59; }
.eval-col.broken .mark { color: #b0573f; }
.eval-notes-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gold); margin: 40px 0 16px;
}

/* ── GLYPH DIVIDER ── */
.glyph-divider {
  text-align: center; color: var(--gold); opacity: 0.5;
  font-size: 16px; letter-spacing: 0.4em; margin: 8px 0 28px;
}

/* ── WRITER: TYPE TOGGLE + EVAL FIELDS ── */
.editor-type-toggle {
  display: flex; gap: 6px; margin-bottom: 22px;
  background: var(--cream); padding: 4px; border-radius: 999px;
  border: 0.5px solid var(--border); width: fit-content;
}
.type-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; border: none; background: none;
  color: var(--muted); padding: 7px 18px; border-radius: 999px;
  cursor: pointer; transition: all 0.2s;
}
.type-btn.active { background: var(--ink); color: var(--cream); }
.eval-only { display: none; }
body.writing-eval .eval-only { display: block; }

.eval-score-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; }
.eval-score-row label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); }
.editor-field-score {
  font-family: var(--mono); font-size: 22px; font-weight: 700;
  width: 90px; border: none; border-bottom: 0.5px solid var(--border);
  background: transparent; outline: none; color: var(--ink); padding: 4px 0;
}
.editor-field-verdict {
  font-family: 'EB Garamond', serif; font-size: 18px; font-style: italic;
  width: 100%; border: none; outline: none; background: transparent;
  color: var(--ink-soft); margin-bottom: 20px; text-transform: lowercase;
}
.editor-field-verdict::placeholder { color: rgba(0,0,0,0.2); }
.eval-lists { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 22px; }
@media (max-width: 600px) { .eval-lists { grid-template-columns: 1fr; } }
.eval-list-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
.eval-list-label.works { color: #4a7c59; }
.eval-list-label.broken { color: #b0573f; }
.editor-field-list {
  font-family: 'EB Garamond', serif; font-size: 16px; line-height: 1.6;
  width: 100%; min-height: 110px; border: 0.5px solid var(--border);
  border-radius: 4px; padding: 12px 14px; background: rgba(255,255,255,0.5);
  outline: none; color: var(--ink-soft); resize: vertical; text-transform: lowercase;
}
.editor-field-list::placeholder { color: rgba(0,0,0,0.22); font-style: italic; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .stagger-item { opacity: 1; transform: none; }
}
</style>
</head>
<body>

<div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

<div class="blog-scrapbook">

<script>
// ── STATE ──
let posts = [];
let editingId = null;
let autoSaveTimer = null;
let writeUnlocked = false;
let currentImages = [];
let currentType = 'writing';
let currentFilter = 'all';

// ── STORAGE ──
const STORAGE_KEY = 'aanya-blog-posts';
const WRITE_PASSWORD = 'write';
const WRITE_AUTH_KEY = 'aanya-blog-write-unlocked';

async function loadPosts() {
  posts = loadLocalPosts();
  try {
    if (posts.length === 0 && window.storage) {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) {
        posts = JSON.parse(result.value);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
      }
    }
  } catch(e) {
    posts = loadLocalPosts();
  }
  renderFeed();
  renderDraftList();
}

function loadLocalPosts() {
  try {
    const result = localStorage.getItem(STORAGE_KEY);
    return result ? JSON.parse(result) : [];
  } catch(e) {
    return [];
  }
}

async function savePosts() {
  const value = JSON.stringify(posts);
  try {
    localStorage.setItem(STORAGE_KEY, value);
  } catch(e) {
    console.error('storage error', e);
  }
  try {
    if (window.storage) {
      await window.storage.set(STORAGE_KEY, value);
    }
  } catch(e) {}
}

// ── NAVIGATION ──
function showPage(name) {
  if (name === 'write' && !writeUnlocked) {
    showAuthPage();
    return;
  }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'feed') document.getElementById('nav-feed').classList.add('active');
  if (name === 'write') document.getElementById('nav-write').classList.add('active');
  window.scrollTo(0, 0);
}

function showAuthPage() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-auth').classList.add('active');
  window.scrollTo(0, 0);
  setTimeout(() => document.getElementById('write-password').focus(), 0);
}

function unlockWrite(event) {
  event.preventDefault();
  const input = document.getElementById('write-password');
  const error = document.getElementById('auth-error');
  if (input.value === WRITE_PASSWORD) {
    writeUnlocked = true;
    try {
      sessionStorage.setItem(WRITE_AUTH_KEY, 'true');
    } catch(e) {}
    document.getElementById('nav-write').style.display = '';
    error.textContent = '';
    window.location.hash = 'write';
    showPage('write');
    return;
  }
  input.value = '';
  error.textContent = 'wrong password';
  input.focus();
}

function isWriteRoute() {
  const path = window.location.pathname.toLowerCase();
  const search = window.location.search.toLowerCase();
  const hash = window.location.hash.toLowerCase();
  return hash === '#write' || search.includes('write') || path.endsWith('/write') || path.endsWith('/blog.html/write');
}

// ── FEED ──
function renderFeed() {
  const list = document.getElementById('feed-list');
  const empty = document.getElementById('feed-empty');
  const allPublished = posts.filter(p => p.published).sort((a,b) => b.date - a.date);

  // update filter counts
  const writingCount = allPublished.filter(p => (p.type || 'writing') !== 'eval').length;
  const evalCount = allPublished.filter(p => (p.type || 'writing') === 'eval').length;
  const cw = document.getElementById('count-writing'); if (cw) cw.textContent = writingCount ? '(' + writingCount + ')' : '';
  const ce = document.getElementById('count-eval'); if (ce) ce.textContent = evalCount ? '(' + evalCount + ')' : '';

  const published = allPublished.filter(p => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'eval') return (p.type || 'writing') === 'eval';
    return (p.type || 'writing') !== 'eval';
  });

  list.querySelectorAll('.post-card').forEach(c => c.remove());

  if (published.length === 0) {
    empty.style.display = 'block';
    empty.innerHTML = allPublished.length === 0
      ? 'nothing here yet.<br>go write something.'
      : 'nothing in this lane yet.';
    return;
  }
  empty.style.display = 'none';

  published.forEach((post, i) => {
    const card = document.createElement('div');
    const isEval = (post.type || 'writing') === 'eval';
    card.onclick = () => openPost(post.id);

    if (isEval) {
      card.className = 'post-card eval-card stagger-item';
      const score = (post.score !== undefined && post.score !== null && post.score !== '') ? Number(post.score) : null;
      card.innerHTML = `
        ${score !== null ? `<div class="score-dial" style="--score:${(score/10*100).toFixed(0)}">
          <span class="score-num" data-score="${score}">${score.toFixed(1)}</span>
          <span class="score-den">/10</span>
        </div>` : ''}
        <div class="eval-card-body">
          <div class="post-meta">
            <span class="post-tag eval-tag">product eval</span>
            ${post.tag ? `<span class="eval-platform">· ${post.tag}</span>` : ''}
            <span class="post-date">${formatDate(post.date)}</span>
          </div>
          <div class="post-title-feed">${post.title || 'untitled product'}</div>
          ${post.verdict ? `<div class="eval-verdict">${post.verdict}</div>` : ''}
          <div class="post-read-more">read teardown →</div>
        </div>
      `;
    } else {
      card.className = 'post-card stagger-item';
      const preview = post.body.replace(/<[^>]+>/g,'').slice(0, 140);
      card.innerHTML = `
        <div class="post-meta">
          ${post.tag ? `<span class="post-tag">${post.tag}</span>` : ''}
          <span class="post-date">${formatDate(post.date)}</span>
        </div>
        <div class="post-title-feed">${post.title || 'untitled'}</div>
        <div class="post-preview">${preview}${preview.length >= 140 ? '…' : ''}</div>
        <div class="post-read-more">read →</div>
      `;
    }
    list.appendChild(card);
  });

  revealStagger();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderFeed();
}

let staggerObserver = null;
function revealStagger() {
  if (!staggerObserver) {
    staggerObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          animateDial(e.target);
          staggerObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
  }
  const items = document.querySelectorAll('.feed .stagger-item:not(.in)');
  items.forEach((item, i) => {
    item.style.transitionDelay = (i * 70) + 'ms';
    staggerObserver.observe(item);
  });
}

function animateDial(scope) {
  const num = scope.querySelector ? scope.querySelector('.score-num[data-score]') : null;
  if (!num) return;
  const target = parseFloat(num.dataset.score);
  let cur = 0;
  const steps = 26;
  let i = 0;
  const tick = () => {
    i++;
    cur = target * (i / steps);
    num.textContent = cur.toFixed(1);
    if (i < steps) requestAnimationFrame(tick);
    else num.textContent = target.toFixed(1);
  };
  requestAnimationFrame(tick);
}

function openPost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  const isEval = (post.type || 'writing') === 'eval';
  const titleEl = document.getElementById('view-title');
  const dividerEl = document.querySelector('#page-post .post-divider');
  const metaEl = document.querySelector('#page-post .post-header-meta');

  if (isEval) {
    metaEl.style.display = 'none';
    titleEl.style.display = 'none';
    dividerEl.style.display = 'none';
    document.getElementById('view-body').innerHTML = renderEvalView(post);
  } else {
    metaEl.style.display = '';
    titleEl.style.display = '';
    dividerEl.style.display = '';
    titleEl.textContent = post.title || 'untitled';
    document.getElementById('view-date').textContent = formatDate(post.date);
    document.getElementById('view-tag').textContent = post.tag || '';
    document.getElementById('view-tag').style.display = post.tag ? '' : 'none';
    document.getElementById('view-body').innerHTML = renderPostBody(post.body, post.images || []);
  }
  showPage('post');
  if (isEval) setTimeout(() => animateDial(document.getElementById('view-body')), 120);
}

function renderEvalView(post) {
  const score = (post.score !== undefined && post.score !== null && post.score !== '') ? Number(post.score) : null;
  const works = (post.works || '').split('\n').map(s => s.trim()).filter(Boolean);
  const broken = (post.broken || '').split('\n').map(s => s.trim()).filter(Boolean);
  const dial = score !== null ? `
    <div class="score-dial" style="--score:${(score/10*100).toFixed(0)}">
      <span class="score-num" data-score="${score}">0.0</span>
      <span class="score-den">/10</span>
    </div>` : '';
  const columns = (works.length || broken.length) ? `
    <div class="eval-columns">
      <div class="eval-col works">
        <div class="eval-col-label">+ what works</div>
        ${works.map(w => `<div class="eval-point"><span class="mark">+</span><span>${w}</span></div>`).join('') || '<div class="eval-point" style="opacity:.4">—</div>'}
      </div>
      <div class="eval-col broken">
        <div class="eval-col-label">− what's broken</div>
        ${broken.map(b => `<div class="eval-point"><span class="mark">−</span><span>${b}</span></div>`).join('') || '<div class="eval-point" style="opacity:.4">—</div>'}
      </div>
    </div>` : '';
  const notes = (post.body && post.body.trim()) ? `
    <div class="eval-notes-label">⁂ the longer read</div>
    ${renderPostBody(post.body, [])}` : '';
  const images = (post.images && post.images.length) ? post.images.map(src => `<img src="${src}" alt="">`).join('') : '';
  return `
    <div class="eval-hero">
      ${dial}
      <div class="eval-hero-meta">
        <div class="eval-product-name">${post.title || 'untitled product'}</div>
        <div class="eval-product-sub">product eval${post.tag ? ' · ' + post.tag : ''} · ${formatDate(post.date)}</div>
      </div>
    </div>
    ${post.verdict ? `<div class="eval-verdict-big">${post.verdict}</div>` : ''}
    ${columns}
    ${notes}
    ${images}
  `;
}

function renderPostBody(body, images = []) {
  const textHtml = (body || '').split('\n\n').map(block => {
    const trimmed = block.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('<img ')) return trimmed;
    return `<p>${trimmed.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  const imageHtml = images.map(src => `<img src="${src}" alt="">`).join('');
  return textHtml + imageHtml;
}

// ── WRITER ──
function renderDraftList() {
  const list = document.getElementById('draft-list');
  list.innerHTML = '';
  if (posts.length === 0) {
    list.innerHTML = '<p style="font-style:italic;color:var(--muted);font-size:15px;padding:16px 0 24px;">no posts yet.</p>';
    return;
  }
  const sorted = [...posts].sort((a,b) => b.date - a.date);
  sorted.forEach(post => {
    const div = document.createElement('div');
    div.className = 'draft-item';
    div.innerHTML = `
      <span class="draft-item-title">${post.title || 'untitled'} ${post.published ? '<span style="font-size:11px;color:var(--gold);letter-spacing:1px;">live</span>' : '<span style="font-size:11px;color:var(--muted);letter-spacing:1px;">draft</span>'}</span>
      <span class="draft-item-date">${formatDate(post.date)}</span>
      <div class="draft-item-actions">
        <button class="btn-ghost" onclick="editPost('${post.id}')">edit</button>
        <button class="btn-ghost delete" onclick="deletePost('${post.id}')">delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function setEditorType(t) {
  currentType = t;
  document.body.classList.toggle('writing-eval', t === 'eval');
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === t));
  document.getElementById('post-title').placeholder = t === 'eval' ? 'product name' : 'title';
  document.getElementById('post-tag').placeholder = t === 'eval' ? 'platform / category (e.g. ios · fintech)' : 'tag (e.g. on life, lately, rant)';
  document.getElementById('post-body').placeholder = t === 'eval' ? 'optional longer read — context, deeper analysis, the story behind the score…' : "write anything. no one's watching.";
}

function clearEvalFields() {
  document.getElementById('post-score').value = '';
  document.getElementById('post-verdict').value = '';
  document.getElementById('post-works').value = '';
  document.getElementById('post-broken').value = '';
}

function newPost() {
  editingId = null;
  document.getElementById('post-title').value = '';
  document.getElementById('post-tag').value = '';
  document.getElementById('post-body').value = '';
  clearEvalFields();
  setEditorType('writing');
  currentImages = [];
  renderEditorImages();
  document.getElementById('editor-status').textContent = 'new post';
  document.getElementById('post-title').focus();
  document.getElementById('editor-wrap').scrollIntoView({ behavior: 'smooth' });
}

function editPost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  editingId = id;
  document.getElementById('post-title').value = post.title;
  document.getElementById('post-tag').value = post.tag || '';
  const normalized = extractBodyImages(post.body || '');
  document.getElementById('post-body').value = normalized.body;
  setEditorType((post.type || 'writing') === 'eval' ? 'eval' : 'writing');
  document.getElementById('post-score').value = (post.score !== undefined && post.score !== null) ? post.score : '';
  document.getElementById('post-verdict').value = post.verdict || '';
  document.getElementById('post-works').value = post.works || '';
  document.getElementById('post-broken').value = post.broken || '';
  currentImages = [...(post.images || []), ...normalized.images];
  renderEditorImages();
  document.getElementById('editor-status').textContent = 'editing';
  document.getElementById('editor-wrap').scrollIntoView({ behavior: 'smooth' });
}

async function savePost(publish) {
  const title = document.getElementById('post-title').value.trim();
  const tag = document.getElementById('post-tag').value.trim();
  let body = document.getElementById('post-body').value.trim();
  const normalized = extractBodyImages(body);
  body = normalized.body;
  if (normalized.images.length) {
    currentImages = [...currentImages, ...normalized.images];
    renderEditorImages();
  }

  const type = currentType;
  const scoreRaw = document.getElementById('post-score').value.trim();
  const score = scoreRaw === '' ? null : Math.max(0, Math.min(10, parseFloat(scoreRaw)));
  const verdict = document.getElementById('post-verdict').value.trim();
  const works = document.getElementById('post-works').value.trim();
  const broken = document.getElementById('post-broken').value.trim();

  const hasEvalContent = type === 'eval' && (verdict || works || broken || score !== null);
  if (!title && !body && currentImages.length === 0 && !hasEvalContent) { showToast('add a title, words, or an image first'); return; }

  if (editingId) {
    const idx = posts.findIndex(p => p.id === editingId);
    if (idx !== -1) {
      // preserve original date if just editing, update only if publishing fresh
      posts[idx].title = title;
      posts[idx].tag = tag;
      posts[idx].body = body;
      posts[idx].images = [...currentImages];
      posts[idx].type = type;
      posts[idx].score = score;
      posts[idx].verdict = verdict;
      posts[idx].works = works;
      posts[idx].broken = broken;
      if (publish && !posts[idx].published) {
        posts[idx].date = Date.now(); // set publish date first time
      }
      posts[idx].published = publish;
    }
  } else {
    const newPost = {
      id: Date.now().toString(),
      title, tag, body,
      images: [...currentImages],
      type, score, verdict, works, broken,
      published: publish,
      date: Date.now()
    };
    posts.push(newPost);
    editingId = newPost.id;
  }

  await savePosts();
  renderFeed();       // mirror changes immediately
  renderDraftList();
  document.getElementById('editor-status').textContent = publish ? 'published ✓' : 'draft saved ✓';
  showToast(publish ? 'published — live on your blog!' : 'saved as draft');
}

function extractBodyImages(body) {
  const images = [];
  const cleaned = body.replace(/<img\s+[^>]*src="([^"]+)"[^>]*>/gi, (match, src) => {
    images.push(src);
    return '';
  }).replace(/\n{3,}/g, '\n\n').trim();
  return { body: cleaned, images };
}

async function deletePost(id) {
  if (!confirm('delete this post?')) return;
  posts = posts.filter(p => p.id !== id);
  if (editingId === id) {
    editingId = null;
    document.getElementById('post-title').value = '';
    document.getElementById('post-tag').value = '';
    document.getElementById('post-body').value = '';
    clearEvalFields();
    currentImages = [];
    renderEditorImages();
    document.getElementById('editor-status').textContent = 'deleted';
  }
  await savePosts();
  renderFeed();
  renderDraftList();
  showToast('deleted');
}

// ── FORMATTING ──
function fmt(cmd) {
  const ta = document.getElementById('post-body');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const sel = ta.value.slice(start, end);
  if (!sel) return;
  const wrap = cmd === 'bold' ? ['**','**'] : ['_','_'];
  ta.value = ta.value.slice(0,start) + wrap[0] + sel + wrap[1] + ta.value.slice(end);
  ta.focus();
}

function insertHr() {
  const ta = document.getElementById('post-body');
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0,pos) + '\n\n—\n\n' + ta.value.slice(pos);
  ta.focus();
}

function pickImage() {
  document.getElementById('post-image').click();
}

function insertImage(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = event => {
    const img = new Image();
    img.onload = () => {
      const max = 1400;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.76);
      currentImages.push(dataUrl);
      renderEditorImages();
      document.getElementById('editor-status').textContent = 'unsaved';
      showToast('image added');
      input.value = '';
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}

function renderEditorImages() {
  const wrap = document.getElementById('editor-images');
  wrap.innerHTML = '';
  currentImages.forEach((src, index) => {
    const card = document.createElement('div');
    card.className = 'editor-image-card';
    card.innerHTML = `
      <img src="${src}" alt="">
      <button class="editor-image-remove" onclick="removeImage(${index})">remove</button>
    `;
    wrap.appendChild(card);
  });
}

function removeImage(index) {
  currentImages.splice(index, 1);
  renderEditorImages();
  document.getElementById('editor-status').textContent = 'unsaved';
}

function insertAtCursor(text) {
  const ta = document.getElementById('post-body');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + text + ta.value.slice(end);
  const next = start + text.length;
  ta.setSelectionRange(next, next);
  ta.focus();
}

// auto-save draft every 2s while typing; also save on blur + warn on close
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('post-body');
  const titleEl = document.getElementById('post-title');
  [ta, titleEl].forEach(el => {
    el.addEventListener('input', () => {
      document.getElementById('editor-status').textContent = 'unsaved';
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => savePost(false), 2000);
    });
    el.addEventListener('blur', () => {
      const hasContent = document.getElementById('post-title').value.trim() || document.getElementById('post-body').value.trim();
      if (hasContent && document.getElementById('editor-status').textContent === 'unsaved') {
        savePost(false);
      }
    });
  });
  window.addEventListener('beforeunload', e => {
    if (document.getElementById('editor-status').textContent === 'unsaved') {
      e.preventDefault();
      e.returnValue = '';
    }
  });
  try {
    writeUnlocked = sessionStorage.getItem(WRITE_AUTH_KEY) === 'true';
  } catch(e) { writeUnlocked = false; }
  if (writeUnlocked) document.getElementById('nav-write').style.display = '';
  loadPosts();
  if (isWriteRoute()) {
    if (!writeUnlocked) { showAuthPage(); return; }
    showPage('write');
  } else {
    showPage('feed');
  }
});

// ── UTILS ──
function formatDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toLowerCase();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SCROLL PROGRESS ──
window.addEventListener('scroll', () => {
  const bar = document.getElementById('scroll-progress');
  if (!bar) return;
  const total = document.documentElement.scrollHeight - window.innerHeight;
  bar.style.width = total > 0 ? (window.scrollY / total * 100) + '%' : '0%';
}, { passive: true });
</script>
